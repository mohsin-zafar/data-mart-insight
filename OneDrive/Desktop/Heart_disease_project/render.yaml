# ============================================
# Heart Disease Detection - Render Deployment
# ============================================
# Render Blueprint for automatic deployment

services:
  # Backend API Service
  - type: web
    name: heart-disease-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: ENVIRONMENT
        value: production

  # Frontend Streamlit Service
  - type: web
    name: heart-disease-frontend
    env: python
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
      - key: API_URL
        fromService:
          type: web
          name: heart-disease-backend
          property: url
